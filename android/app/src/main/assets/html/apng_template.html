<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  .container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .container img { max-width: 100%; max-height: 100%; object-fit: contain; {{LOOP_STYLE}} }
</style>
</head>
<body>
  <div class="container">
    <img src="{{URL}}" onload="window._svgWidth=this.naturalWidth;window._svgHeight=this.naturalHeight;if(typeof window.onSvgLoaded==='function')window.onSvgLoaded();" />
  </div>
  <script>
    // Hot-swap API: replace APNG src in-place (no page reload)
    window.updatePetSvg = function(url) {
      var img = document.querySelector('.container img');
      if (img) {
        img.onload = function() {
          window._svgWidth = this.naturalWidth;
          window._svgHeight = this.naturalHeight;
          if (typeof window.onSvgLoaded === 'function') window.onSvgLoaded();
        };
        img.src = url;
      }
    };
  </script>
</body>
</html>
