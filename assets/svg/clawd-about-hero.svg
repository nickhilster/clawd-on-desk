<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 140" width="500" height="320" role="img" aria-labelledby="title desc">
  <title id="title">DeskBuddy About hero</title>
  <desc id="desc">DeskBuddy icon and wordmark with a subtle idle animation.</desc>

  <defs>
    <linearGradient id="deskbuddy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="deskbuddy-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="deskbuddy-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>
    <style>
      .shake-slot {
        transform-origin: 110px 70px;
      }
      .shake-slot.shake {
        animation: shake 0.4s ease-in-out;
      }
      .floaty {
        animation: floaty 4s ease-in-out infinite;
      }
      .sparkle-a {
        animation: sparkle-a 2.8s ease-in-out infinite;
      }
      .sparkle-b {
        animation: sparkle-b 3.2s ease-in-out infinite;
      }
      @keyframes shake {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-2deg); }
        60% { transform: rotate(2deg); }
        80% { transform: rotate(-1deg); }
      }
      @keyframes floaty {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes sparkle-a {
        0%, 100% { opacity: 0.25; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.1); }
      }
      @keyframes sparkle-b {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 0.85; transform: scale(1.05); }
      }
      text {
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
    </style>
  </defs>

  <g class="shake-slot" id="shake-slot">
    <rect x="18" y="18" width="184" height="104" rx="28" fill="url(#deskbuddy-bg)"/>
    <g class="floaty" filter="url(#deskbuddy-shadow)">
      <rect x="34" y="34" width="54" height="54" rx="16" fill="url(#deskbuddy-icon)"/>
      <circle cx="52" cy="58" r="4.5" fill="#111827"/>
      <circle cx="70" cy="58" r="4.5" fill="#111827"/>
      <path d="M49 72c5 5 17 5 22 0" fill="none" stroke="#111827" stroke-width="4.5" stroke-linecap="round"/>
    </g>

    <text x="104" y="61" font-size="28" font-weight="700" fill="#f8fafc">DeskBuddy</text>
    <text x="104" y="84" font-size="12" letter-spacing="1.8" fill="#94a3b8">DESKTOP COMPANION</text>

    <g class="sparkle-a" transform="translate(179 34)">
      <path d="M0 8h6M3 5v6" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g class="sparkle-b" transform="translate(165 90)">
      <path d="M0 6h5M2.5 3.5v5" stroke="#fdba74" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
